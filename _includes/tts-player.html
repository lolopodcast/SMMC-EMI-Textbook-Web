<div class="tts-controls">
  <button onclick="TTS.speak('en')" title="Read in English">🔊 Read Aloud (EN)</button>
  <button onclick="TTS.speak('zh')" title="朗讀中文">🔊 朗讀 (中文)</button>
  <button onclick="TTS.pause()" title="Pause / Resume">⏸</button>
  <button onclick="TTS.stop()" title="Stop">⏹</button>
  <button onclick="TTS.setRate(-0.2)" title="Slower">🐢</button>
  <button onclick="TTS.setRate(0.2)" title="Faster">🐰</button>
  <span class="tts-status"></span>
</div>
<script src="/assets/tts-player.js"></script>
<script src="/SMMC-EMI-Textbook-Web/assets/copyright-notice.js"></script>
