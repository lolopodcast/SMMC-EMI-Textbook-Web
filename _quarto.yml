format:
  html:
    theme:
      light: [cosmo, theme.scss]
      dark: [cosmo, theme-dark.scss]
    toc: true
    toc-depth: 3
    toc-title: "On This Page"
    code-copy: true
    code-overflow: wrap
    back-to-top-navigation: true
    mermaid:
      theme: neutral
    include-in-header:
      - text: |
          <meta name="referrer" content="strict-origin-when-cross-origin">
          <meta name="robots" content="index, follow, max-snippet:200, max-image-preview:large">
          <meta http-equiv="X-Content-Type-Options" content="nosniff">
          <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
          <meta name="copyright" content="© 2026 Prof. Shihmin Lo, NCNU. CC BY-NC-SA 4.0">
          <meta name="author" content="Prof. Shihmin Lo, National Chi Nan University, Taiwan">
    include-after-body:
      - _partials/copyright-notice.html
