project: 
  type: website
website: 
  page-navigation: true
  title: "SMMC-EMI Course Textbook" 
  site-url: "https://lolopodcast.github.io/SMMC-EMI-Textbook-Web" 
  repo-url: "https://github.com/lolopodcast/SMMC-EMI-Textbook-Web"
  repo-actions: [edit, source, issue]
  favicon: images/favicon.ico
  
  page-footer:
    right: "This page is built with [Quarto](https://quarto.org/)."
    left: "&copy; 2026 Prof. Shihmin Lo, National Chi Nan University"
  
  sidebar:
    background: "#D9E3E4"
    favicon: images/favicon.ico
    pinned: true
    align: center
    tools: 
      - icon: github
        href: https://github.com/lolopodcast/SMMC-EMI-Textbook-Web
        text: "GitHub Repository"
    style: "docked"
    search: true
    collapse-level: 1
    contents:
      - href: index.qmd
        text: Home
      - href: content/add-content.qmd
        text: Add content
      - href: content/customizing.qmd
        text: Customizing
      - href: content/rendering.qmd
        text: Rendering
      - href: content/publishing.qmd
        text: Publishing
      - href: content/acknowledgements.qmd
        text: Acknowledgements
format:
  html:
    theme:
      light: [cosmo, theme.scss] 
      dark: [cosmo, theme-dark.scss]
    code-copy: true
    code-overflow: wrap
    toc: true
filters:
  - include-files.lua
  - quarto
