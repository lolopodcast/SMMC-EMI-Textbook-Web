project: 
  type: website
  
website: 
  page-navigation: true
  reader-mode: true
  title: "SMMC-EMI Course Textbook" 
  description: "Strategic Management of Multinational Corporations — An EMI Capstone Course at NCNU"
  site-url: "https://lolopodcast.github.io/SMMC-EMI-Textbook-Web" 
  repo-url: "https://github.com/lolopodcast/SMMC-EMI-Textbook-Web"
  repo-actions: [edit, source, issue]
  favicon: images/favicon.ico
  
  page-footer:
